services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: mypharma
      POSTGRES_PASSWORD: mypharma
      POSTGRES_DB: mypharma
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6380"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
