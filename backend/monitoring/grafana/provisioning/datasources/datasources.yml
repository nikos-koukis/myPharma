apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
    editable: false

  - name: PostgreSQL
    uid: postgresql
    type: postgres
    access: proxy
    url: localhost:5432
    database: mypharma
    user: mypharma
    secureJsonData:
      password: mypharma
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    editable: false
